<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAMEED ULLAH IMAGE TO LINK</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

body{
    font-family:'Poppins',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#f0f2f5;
}

.container{
    background:#fff;
    padding:40px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    text-align:center;
    max-width:500px;
    width:100%;
}

h1{
    font-size:2.2em;
    font-weight:700;
    margin-bottom:20px;
}

/* 🔵 CIRCLE LINKS */
.links{
    margin-bottom:20px;
    display:flex;
    justify-content:center;
    gap:15px;
}

.links a{
    width:55px;
    height:55px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    text-decoration:none;
    color:#fff;
    font-size:22px;
    transition:0.3s;
}

.whatsapp{
    background:#25D366;
}

.toolkit{
    background:#111827;
}

.links a:hover{
    transform:scale(1.1);
}

/* UPLOAD */
.upload-area{
    border:2px dashed #ccc;
    padding:30px;
    border-radius:12px;
    cursor:pointer;
}

.upload-area i{
    font-size:40px;
    color:#2196F3;
}

input[type="file"]{
    display:none;
}

#urlOutput{
    width:100%;
    margin-top:20px;
    padding:10px;
    border-radius:8px;
    border:1px solid #ddd;
    text-align:center;
}

/* BUTTONS */
.button-group{
    margin-top:20px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:50px;
    margin:5px;
    cursor:pointer;
    font-weight:bold;
}

.upload-button{
    background:#4CAF50;
    color:#fff;
}

.copy-button{
    background:#555;
    color:#fff;
}

/* FOOTER */
.footer{
    margin-top:25px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>HAMEED ULLAH IMAGE TO LINK</h1>

<!-- 🔵 CIRCLE BUTTONS -->
<div class="links">
    <a href="https://whatsapp.com/channel/0029Vb7v80n72WTshGXMjm2x" target="_blank" class="whatsapp">
        <i class="fab fa-whatsapp"></i>
    </a>

    <a href="https://toolkit.page.gd/t/hameedullah" target="_blank" class="toolkit">
        <i class="fas fa-tools"></i>
    </a>
</div>

<div class="upload-area" onclick="document.getElementById('imageUpload').click()">
    <i class="fas fa-cloud-upload-alt"></i>
    <p>Click to Upload Image</p>
    <input type="file" id="imageUpload" accept="image/*">
</div>

<input type="text" id="urlOutput" readonly placeholder="Image link will appear here">

<div class="button-group">
    <button class="upload-button" onclick="uploadAndGenerate()">Generate Link</button>
    <button class="copy-button" onclick="copyLink()">Copy Link</button>
</div>

<div class="footer">
    Developed By HAMEED ULLAH
</div>

</div>

<script>
async function uploadAndGenerate(){
    const fileInput = document.getElementById('imageUpload');
    const urlInput = document.getElementById('urlOutput');
    const file = fileInput.files[0];

    if(!file){
        alert("Select image first");
        return;
    }

    let formData = new FormData();
    formData.append('image', file);
    formData.append('key','274910e7dcf1794b3cdcce6956bc00b3');

    let res = await fetch("https://api.imgbb.com/1/upload",{
        method:"POST",
        body:formData
    });

    let data = await res.json();

    if(data.success){
        urlInput.value = data.data.url;
    }else{
        alert("Upload failed");
    }
}

function copyLink(){
    let input = document.getElementById("urlOutput");
    input.select();
    document.execCommand("copy");
    alert("Copied!");
}
</script>

</body>
</html>

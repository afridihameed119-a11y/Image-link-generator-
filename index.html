<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAMEED ULLAH IMAGE TO LINK</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body{
    font-family:'Segoe UI',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#f0f2f5;
}

.container{
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(0,0,0,0.1);
    text-align:center;
    max-width:420px;
    width:100%;
}

h1{
    margin-bottom:20px;
}

/* 🔵 CIRCLE BUTTONS */
.links{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:20px;
}

.links a{
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:24px;
    text-decoration:none;
    transition:0.3s;
}

.links a:hover{
    transform:scale(1.1);
}

.whatsapp{background:#25D366;}
.toolkit{background:#111827;}

/* UPLOAD BOX */
.upload-area{
    border:2px dashed #ccc;
    padding:30px;
    border-radius:12px;
    cursor:pointer;
    margin-bottom:15px;
}

.upload-area:hover{
    border-color:#4CAF50;
}

input[type="file"]{display:none;}

#urlOutput{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
    text-align:center;
    margin-top:10px;
}

/* BUTTONS */
.btn{
    padding:12px 20px;
    border:none;
    border-radius:50px;
    margin-top:10px;
    cursor:pointer;
    width:48%;
}

.green{background:#4CAF50;color:#fff;}
.dark{background:#444;color:#fff;}

.btns{
    display:flex;
    justify-content:space-between;
}

</style>
</head>

<body>

<div class="container">

<h1>HAMEED ULLAH IMAGE TO LINK</h1>

<!-- 🔵 LINKS -->
<div class="links">
<a href="https://whatsapp.com/channel/0029Vb7v80n72WTshGXMjm2x" target="_blank" class="whatsapp">
<i class="fab fa-whatsapp"></i>
</a>

<a href="https://toolkit.page.gd/t/hameedullah" target="_blank" class="toolkit">
<i class="fas fa-tools"></i>
</a>
</div>

<!-- UPLOAD -->
<div class="upload-area" onclick="imageUpload.click()">
Click to Upload Image
<input type="file" id="imageUpload" accept="image/*">
</div>

<input type="text" id="urlOutput" placeholder="Image link will appear here">

<div class="btns">
<button class="btn green" onclick="upload()">Generate Link</button>
<button class="btn dark" onclick="copy()">Copy Link</button>
</div>

</div>

<script>
async function upload(){
    let file = document.getElementById("imageUpload").files[0];
    let output = document.getElementById("urlOutput");

    if(!file){
        alert("Select image first");
        return;
    }

    let reader = new FileReader();

    reader.onloadend = async function(){
        let base64 = reader.result.split(',')[1];

        let formData = new FormData();
        formData.append("key", "274910e7dcf1794b3cdcce6956bc00b3");
        formData.append("image", base64);

        try{
            let res = await fetch("https://api.imgbb.com/1/upload", {
                method: "POST",
                body: formData
            });

            let data = await res.json();

            if(data.success){
                output.value = data.data.url;
            }else{
                alert("Upload failed");
            }

        }catch(e){
            alert("Error: " + e.message);
        }
    };

    reader.readAsDataURL(file);
}

function copy(){
    let input = document.getElementById("urlOutput");

    if(!input.value){
        alert("No link yet");
        return;
    }

    input.select();
    document.execCommand("copy");
    alert("Copied!");
}
</script>

</body>
</html>
